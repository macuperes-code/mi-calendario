<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Calendario</title>
<style>
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0ede6; --muted: #666;
    --web: #c8f060; --web-dim: #1a2608;
    --ig: #f0a0c8; --ig-dim: #2a0e1e;
    --fm: #60c8f0; --fm-dim: #081a2a;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; min-height: 100vh; padding: 2rem; }
  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
  h1 { font-family: Georgia, serif; font-size: 2.2rem; font-weight: 400; line-height: 1; }
  h1 span { font-style: italic; color: var(--muted); font-size: 1.4rem; }
  .date-display { text-align: right; color: var(--muted); font-size: 11px; line-height: 1.8; }
  .projects { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
  .project-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; letter-spacing: 0.05em; text-transform: uppercase; }
  .project-pill.web { background: var(--web-dim); color: var(--web); border-color: #3a5010; }
  .project-pill.ig  { background: var(--ig-dim);  color: var(--ig);  border-color: #4a1a30; }
  .project-pill.fm  { background: var(--fm-dim);  color: var(--fm);  border-color: #103040; }
  .project-pill.all { background: var(--surface2); color: var(--muted); border-color: var(--border); }
  .project-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .project-pill.web .dot { background: var(--web); }
  .project-pill.ig .dot  { background: var(--ig); }
  .project-pill.fm .dot  { background: var(--fm); }
  .layout { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; align-items: start; }
  .form-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
  .form-title { font-family: Georgia, serif; font-size: 1.1rem; font-weight: 400; margin-bottom: 1.25rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
  input, textarea, select { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; padding: 10px 12px; transition: border-color 0.2s; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: #444; }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: #1e1e1e; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .project-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 2px; }
  .proj-btn { padding: 10px 8px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11px; font-weight: 500; text-align: center; transition: all 0.15s; }
  .proj-btn.web { background: var(--web-dim); color: var(--web); border-color: #2a3e08; }
  .proj-btn.ig  { background: var(--ig-dim);  color: var(--ig);  border-color: #3a0e20; }
  .proj-btn.fm  { background: var(--fm-dim);  color: var(--fm);  border-color: #082030; }
  .proj-btn.active.web { border-color: var(--web); box-shadow: 0 0 0 1px var(--web); }
  .proj-btn.active.ig  { border-color: var(--ig);  box-shadow: 0 0 0 1px var(--ig); }
  .proj-btn.active.fm  { border-color: var(--fm);  box-shadow: 0 0 0 1px var(--fm); }
  .notify-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .notify-chip { padding: 6px 12px; border-radius: 100px; border: 0.5px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .notify-chip.active { background: #1e2e1e; border-color: #3a5a3a; color: #90c090; }
  .submit-btn { width: 100%; padding: 13px; border-radius: 8px; border: none; background: var(--text); color: var(--bg); font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s; letter-spacing: 0.05em; }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 12px; display: none; }
  .status.success { background: #0e2010; border: 0.5px solid #2a5030; color: #70c080; display: block; }
  .status.error   { background: #200e0e; border: 0.5px solid #502a2a; color: #c07070; display: block; }
  .status.loading { background: var(--surface2); border: 0.5px solid var(--border); color: var(--muted); display: block; }
  .events-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .events-header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .events-title { font-family: Georgia, serif; font-size: 1.1rem; font-weight: 400; }
  .refresh-btn { background: none; border: 0.5px solid var(--border); border-radius: 6px; color: var(--muted); padding: 5px 10px; font-size: 11px; cursor: pointer; font-family: ui-monospace, monospace; transition: all 0.15s; }
  .refresh-btn:hover { border-color: #444; color: var(--text); }
  .event-item { padding: 1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; gap: 12px; align-items: flex-start; transition: background 0.15s; }
  .event-item:last-child { border-bottom: none; }
  .event-item:hover { background: var(--surface2); }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .event-dot.web { background: var(--web); } .event-dot.ig { background: var(--ig); } .event-dot.fm { background: var(--fm); } .event-dot.other { background: var(--muted); }
  .event-info { flex: 1; min-width: 0; }
  .event-title { font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .event-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; align-self: center; text-transform: uppercase; letter-spacing: 0.05em; }
  .event-tag.web { background: var(--web-dim); color: var(--web); } .event-tag.ig { background: var(--ig-dim); color: var(--ig); } .event-tag.fm { background: var(--fm-dim); color: var(--fm); }
  .empty-state { padding: 2rem 1.5rem; text-align: center; color: var(--muted); font-size: 12px; line-height: 2; }
</style>
</head>
<body>
<header>
  <div><h1>Mi calendario <span>/ sistema</span></h1></div>
  <div class="date-display" id="dateDisplay"></div>
</header>
 
<div class="projects">
  <div class="project-pill all" onclick="filterEvents('all', this)">Todos</div>
  <div class="project-pill web" onclick="filterEvents('web', this)"><span class="dot"></span>Página web</div>
  <div class="project-pill ig"  onclick="filterEvents('ig', this)"><span class="dot"></span>Instagram</div>
  <div class="project-pill fm"  onclick="filterEvents('fm', this)"><span class="dot"></span>Funky Monkey</div>
</div>
 
<div class="layout">
  <div class="form-card">
    <div class="form-title">Nuevo evento</div>
    <div class="field">
      <label>Proyecto</label>
      <div class="project-select">
        <div class="proj-btn web active" onclick="selectProject('web', this)">Página web</div>
        <div class="proj-btn ig"         onclick="selectProject('ig', this)">Instagram</div>
        <div class="proj-btn fm"         onclick="selectProject('fm', this)">Funky Monkey</div>
      </div>
    </div>
    <div class="field">
      <label>Título del evento</label>
      <input type="text" id="title" placeholder="ej. Reunión de revisión de diseño">
    </div>
    <div class="field">
      <label>Tipo de tarea</label>
      <select id="taskType">
        <option value="">— seleccioná el tipo —</option>
        <optgroup label="Página web">
          <option>Desarrollo</option><option>Diseño</option><option>Revisión</option>
        </optgroup>
        <optgroup label="Instagram">
          <option>Grabación</option><option>Edición</option><option>Publicación</option><option>Planificación de contenido</option>
        </optgroup>
        <optgroup label="Funky Monkey">
          <option>Subir evento a redes</option><option>Historia</option><option>Post semanal / Reel</option><option>Carretilla</option><option>Reunión</option>
        </optgroup>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>Fecha</label><input type="date" id="date"></div>
      <div class="field"><label>Hora inicio</label><input type="time" id="timeStart" value="09:00"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Hora fin</label><input type="time" id="timeEnd" value="10:00"></div>
      <div class="field">
        <label>Prioridad</label>
        <select id="priority"><option value="normal">Normal</option><option value="alta">Alta</option><option value="baja">Baja</option></select>
      </div>
    </div>
    <div class="field">
      <label>Descripción / notas</label>
      <textarea id="description" placeholder="Detalles, contexto, links..."></textarea>
    </div>
    <div class="field">
      <label>Notificaciones</label>
      <div class="notify-row">
        <div class="notify-chip active" data-min="10"   onclick="toggleNotify(this)">10 min antes</div>
        <div class="notify-chip"        data-min="30"   onclick="toggleNotify(this)">30 min</div>
        <div class="notify-chip"        data-min="60"   onclick="toggleNotify(this)">1 hora</div>
        <div class="notify-chip"        data-min="1440" onclick="toggleNotify(this)">1 día</div>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitEvent()">Subir a Google Calendar</button>
    <div class="status" id="status"></div>
  </div>
 
  <div class="events-card">
    <div class="events-header">
      <div class="events-title">Próximos eventos</div>
      <button class="refresh-btn" onclick="loadEvents()">↻ actualizar</button>
    </div>
    <div id="eventsList"><div class="empty-state">Cargando eventos...</div></div>
  </div>
</div>
 
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZJ6puSYAWNGYTGsIe4f9Iph3cd8oI_tcVdWlHjpDzsyGl9ZfP1op09v5i6jutDyVgWQ/exec';
 
const PROJECT_COLORS = { web: '2', ig: '6', fm: '1' };
const PROJECT_LABELS = { web: 'Página web', ig: 'Instagram', fm: 'Funky Monkey' };
 
let selectedProject = 'web';
let currentFilter = 'all';
 
function init() {
  const now = new Date();
  document.getElementById('dateDisplay').innerHTML =
    now.toLocaleDateString('es-CR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) +
    '<br>' + now.toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('date').value = now.toISOString().split('T')[0];
  loadEvents();
}
 
function selectProject(project, el) {
  selectedProject = project;
  document.querySelectorAll('.proj-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
 
function toggleNotify(el) { el.classList.toggle('active'); }
 
function filterEvents(f, el) {
  currentFilter = f;
  document.querySelectorAll('.project-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderEvents(window._cachedEvents || []);
}
 
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}
 
async function submitEvent() {
  const title     = document.getElementById('title').value.trim();
  const date      = document.getElementById('date').value;
  const timeStart = document.getElementById('timeStart').value;
  const timeEnd   = document.getElementById('timeEnd').value;
  const desc      = document.getElementById('description').value.trim();
  const taskType  = document.getElementById('taskType').value;
  const priority  = document.getElementById('priority').value;
 
  if (!title || !date) return showStatus('Completá el título y la fecha.', 'error');
 
  const label = PROJECT_LABELS[selectedProject];
  const fullDesc = [
    taskType ? 'Tipo: ' + taskType : '',
    'Proyecto: ' + label,
    priority !== 'normal' ? 'Prioridad: ' + priority.toUpperCase() : '',
    desc ? '\n' + desc : '',
  ].filter(Boolean).join('\n');
 
  const payload = {
    title: '[' + label + '] ' + title,
    start: date + 'T' + timeStart + ':00',
    end:   date + 'T' + timeEnd   + ':00',
    description: fullDesc,
    colorId: PROJECT_COLORS[selectedProject],
  };
 
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('Subiendo a Google Calendar...', 'loading');
 
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    showStatus('✓ Evento subido correctamente', 'success');
    document.getElementById('title').value = '';
    document.getElementById('description').value = '';
    document.getElementById('taskType').value = '';
    setTimeout(loadEvents, 2000);
  } catch(e) {
    showStatus('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}
 
async function loadEvents() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    window._cachedEvents = data;
    renderEvents(data);
  } catch(e) {
    document.getElementById('eventsList').innerHTML = '<div class="empty-state">No se pudieron cargar los eventos</div>';
  }
}
 
function renderEvents(events) {
  const list = document.getElementById('eventsList');
  const filtered = currentFilter === 'all' ? events : events.filter(e => {
    const t = (e.title || '').toLowerCase();
    if (currentFilter === 'web') return t.includes('página web');
    if (currentFilter === 'ig')  return t.includes('instagram');
    if (currentFilter === 'fm')  return t.includes('funky monkey');
    return true;
  });
 
  if (!filtered.length) { list.innerHTML = '<div class="empty-state">No hay eventos próximos</div>'; return; }
 
  list.innerHTML = filtered.map(ev => {
    const title = ev.title || 'Sin título';
    const date  = new Date(ev.start);
    const dateStr = date.toLocaleDateString('es-CR', { weekday: 'short', month: 'short', day: 'numeric' });
    const timeStr = date.toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
    const tl = title.toLowerCase();
    let proj = tl.includes('funky monkey') ? 'fm' : tl.includes('instagram') ? 'ig' : tl.includes('página web') ? 'web' : 'other';
    const tagLabel = proj !== 'other' ? PROJECT_LABELS[proj] : '';
    return '<div class="event-item"><div class="event-dot ' + proj + '"></div><div class="event-info"><div class="event-title">' + title + '</div><div class="event-meta">' + dateStr + ' · ' + timeStr + '</div></div>' + (tagLabel ? '<div class="event-tag ' + proj + '">' + tagLabel + '</div>' : '') + '</div>';
  }).join('');
}
 
init();
</script>
</body>
</html>
